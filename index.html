<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOTUS: PLANNER MARKETING</title>
    <link rel="icon" href="https://energia.fotus.com.br/wp-content/uploads/2025/02/LOGO_Fotus-1A-e1739992227141.png" type="image/png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #0D518E; --purple-light: #1A6BB5; --purple-pale: #E7E7E7;
            --orange: #FAB515; --teal: #00B2C8; --green: #00C07A; --red: #E53935;
            --gray-50: #F8F9FC; --gray-100: #F0F2F7; --gray-200: #E2E6EF;
            --gray-400: #9BA3B8; --gray-600: #5A6375; --gray-800: #454444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Sora', sans-serif; background: var(--gray-50); color: var(--gray-800); min-height: 100vh; }

        /* Estilos da Topbar e Nav */
        .topbar { background: white; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; padding: 0 32px; height: 60px; position: sticky; top: 0; z-index: 100; }
        .nav-btn { padding: 8px 18px; border-radius: 10px; font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--gray-600); transition: all .15s; }
        .nav-btn.active { background: var(--purple-pale); color: var(--purple); font-weight: 600; }

        /* Views */
        .view { display: none; padding: 24px 32px; }
        .view.active { display: block; }

        /* Inteligência Cards */
        .intel-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .intel-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
        .intel-card-title { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--gray-400); }
        
        /* Tema Row */
        .intel-tema-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .intel-tema-bar-wrap { flex: 1; height: 8px; background: var(--gray-100); border-radius: 4px; overflow: hidden; }
        .intel-tema-bar { height: 100%; transition: width 1s ease-out; }
        
        /* Ideia Card */
        .intel-ideia-card { background: var(--gray-50); border-radius: 12px; padding: 12px; margin-bottom: 10px; border-left: 4px solid var(--purple); }
        .intel-ideia-tipo { font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; display: inline-block; margin-bottom: 4px; }
        .intel-ideia-titulo { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
        .intel-ideia-desc { font-size: 11px; color: var(--gray-600); line-height: 1.4; }

        .btn-analisar { background: var(--purple); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .btn-analisar:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="topbar">
        <div style="font-weight: 800; color: var(--purple); margin-right: 40px;">FOTUS PLANNER</div>
        <nav style="display: flex; gap: 10px;">
            <button class="nav-btn active" onclick="switchView('intel')">Inteligência AI</button>
            <button class="nav-btn" onclick="switchView('calendar')">Calendário</button>
        </nav>
        <div id="intel-last-run" style="margin-left: auto; font-size: 11px; color: var(--gray-400); font-family: 'DM Mono';"></div>
    </div>

    <div id="view-intel" class="view active">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h2>Radar de Mercado Solar</h2>
            <button class="btn-analisar" id="btn-run-intel" onclick="runIntelAnalysis()">
                <span>⚡ Analisar Agora</span>
            </button>
        </div>
        <div id="intel-content">
            </div>
    </div>

    <div id="view-calendar" class="view">
        <h2>Calendário de Conteúdo</h2>
        <p>Em breve...</p>
    </div>

    <script>
        /* --- ESTADO GLOBAL --- */
        let currentUser = { id: 'user_123' }; // Simulação de usuário logado
        let intelConcorrentes = [];
        let intelAnalysisRunning = false;
        let intelLastAnalysis = null;
        let intelCurrentTab = 'radar';
        let intelData = { radar: null, ideias: null, alertas: null };

        /* --- MOCK SUPABASE (Substituir por sua função real sbFetch) --- */
        async function sbFetch(table, method = 'GET', data = null) {
            console.log(`Chamada Supabase: ${method} em ${table}`, data);
            // Simulação de retorno do banco
            return []; 
        }

        /* --- NAVEGAÇÃO --- */
        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            event.currentTarget.classList.add('active');
            if(viewId === 'intel') renderIntelView();
        }

        /* --- LÓGICA DE INTELIGÊNCIA (SUAS SUBSTITUIÇÕES AQUI) --- */

        async function renderIntelView() {
            const cont = document.getElementById('intel-content');
            Promise.all([
                loadAnalysesFromSupabase(),
                loadCompetitorsFromSupabase()
            ]).then(() => {
                renderIntelTab('radar');
            }).catch(e => console.error('Erro ao carregar inteligência:', e));
        }

        async function loadAnalysesFromSupabase() {
            try {
                const rows = await sbFetch('analyses?userid=eq.' + currentUser.id + '&order=updatedat.desc&limit=1');
                if (!rows || rows.length === 0) return;
                const latest = rows[0];
                intelLastAnalysis = latest.updatedat;
                intelData.radar   = latest.radardata   ? JSON.parse(latest.radardata)   : null;
                intelData.ideias  = latest.ideasdata   ? JSON.parse(latest.ideasdata)   : null;
                intelData.alertas = latest.alertasdata ? JSON.parse(latest.alertasdata) : null;
                const lastEl = document.getElementById('intel-last-run');
                if (lastEl && intelLastAnalysis) lastEl.textContent = 'Última análise: ' + new Date(intelLastAnalysis).toLocaleString('pt-BR');
            } catch (e) {
                console.error('Erro ao carregar análises:', e);
            }
        }

        async function loadCompetitorsFromSupabase() {
            // Lógica para carregar concorrentes cadastrados
            intelConcorrentes = []; 
        }

        function renderIntelTab(tab) {
            const cont = document.getElementById('intel-content');
            if (tab === 'radar') renderTabRadar(cont);
        }

        function renderTabRadar(cont) {
            const stored = intelData.radar;
            const storedIdeias = intelData.ideias;
            if (!stored) {
                cont.innerHTML = `<div style="text-align:center; padding: 60px; color: var(--gray-400);">📡 Radar ainda não executado. Clique em analisar.</div>`;
                return;
            }
            const ts = intelLastAnalysis ? new Date(intelLastAnalysis).toLocaleString('pt-BR') : '—';
            
            cont.innerHTML = `
            <div class="intel-grid-3">
                <div class="intel-card">
                    <div class="intel-card-title" style="margin-bottom:14px;">🔥 Top Temas da Semana</div>
                    <div id="intel-radar-temas"></div>
                </div>
                <div class="intel-card">
                    <div class="intel-card-title" style="margin-bottom:14px;">🏆 Formatos que Performam</div>
                    <div id="intel-radar-formatos"></div>
                </div>
                <div class="intel-card">
                    <div class="intel-card-title" style="margin-bottom:14px;">📅 Ideias para essa Semana</div>
                    <div id="intel-ideias-lista"></div>
                </div>
            </div>
            <div class="intel-card" style="margin-top:14px;">
                <div class="intel-card-title" style="margin-bottom:14px;">📝 Análise Completa</div>
                <div id="intel-radar-analise" style="font-size:13px; line-height:1.6; color: var(--gray-600);"></div>
            </div>
            <div style="font-size:11px;color:var(--gray-400);text-align:right;margin-top:8px;font-family:'DM Mono',monospace;">
                Última análise: ${ts}
            </div>`;

            // Temas
            const temasEl = document.getElementById('intel-radar-temas');
            (stored.temas || []).forEach((t, i) => {
                temasEl.innerHTML += `<div class="intel-tema-row">
                    <span style="font-size:11px; font-weight:700; width:15px;">${i+1}</span>
                    <span style="font-size:12px; flex:1;">${t.tema || t.nome}</span>
                    <div class="intel-tema-bar-wrap"><div class="intel-tema-bar" style="width:${t.score}%; background:var(--purple)"></div></div>
                    <span style="font-size:10px; font-weight:700;">${t.score}%</span>
                </div>`;
            });

            // Ideias
            const TIPO_COLORS = { Reels:'#E53935', Carrossel:'#1E88E5', Story:'#FB8C00', Post:'#43A047' };
            const ideiasEl = document.getElementById('intel-ideias-lista');
            (storedIdeias?.ideias || []).forEach(ideia => {
                const cor = TIPO_COLORS[ideia.tipo] || '#9BA3B8';
                ideiasEl.innerHTML += `
                <div class="intel-ideia-card">
                    <span class="intel-ideia-tipo" style="background:${cor}20; color:${cor};">${ideia.tipo}</span>
                    <div class="intel-ideia-titulo">${ideia.titulo}</div>
                    <div class="intel-ideia-desc">${ideia.descricao}</div>
                </div>`;
            });

            document.getElementById('intel-radar-analise').innerHTML = stored.analise || '';
        }

        async function runIntelAnalysis() {
            if (intelAnalysisRunning) return;
            intelAnalysisRunning = true;
            document.getElementById('btn-run-intel').disabled = true;
            document.getElementById('btn-run-intel').innerText = '⏳ Analisando...';

            try {
                // SIMULAÇÃO DE RESPOSTA DA IA (Aqui entra sua lógica de fetch da OpenAI/Claude)
                const mockRadar = { 
                    temas: [{nome: 'Eficiência N-Type', score: 95}, {nome: 'Armazenamento Híbrido', score: 82}],
                    formatos: [{nome: 'Reels Educativo', icone: '📱'}],
                    analise: 'O mercado está focado em novas tecnologias de células...'
                };
                const mockIdeias = { 
                    ideias: [{titulo: 'Comparativo Topcon', tipo: 'Carrossel', descricao: 'Explicar vantagens técnicas.'}] 
                };
                const mockAlertas = { alertas: [] };

                const now = new Date().toISOString();
                intelData.radar = mockRadar;
                intelData.ideias = mockIdeias;
                intelData.alertas = mockAlertas;
                intelLastAnalysis = now;

                await saveAnalysisToSupabase(mockRadar, mockIdeias, mockAlertas, intelConcorrentes, now);
                
                renderTabRadar(document.getElementById('intel-content'));
                alert('Análise Concluída!');

            } catch (e) {
                console.error(e);
            } finally {
                intelAnalysisRunning = false;
                document.getElementById('btn-run-intel').disabled = false;
                document.getElementById('btn-run-intel').innerText = '⚡ Analisar Agora';
            }
        }

        async function saveAnalysisToSupabase(radar, ideias, alertas, concorrentes, timestamp) {
            const payload = {
                userid: currentUser.id,
                radardata: JSON.stringify(radar),
                ideasdata: JSON.stringify(ideias),
                alertasdata: JSON.stringify(alertas),
                updatedat: timestamp
            };
            await sbFetch('analyses', 'POST', payload);
        }

        // Inicialização
        window.onload = renderIntelView;

    </script>
</body>
</html>
