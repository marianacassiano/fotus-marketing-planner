<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Planner · Fotus</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --purple:#6B5CE7;--purple-light:#8B7CF7;--purple-pale:#F0EEFF;
  --orange:#FF5C00;--teal:#00B2C8;--green:#00C07A;--red:#E53935;
  --gray-50:#F8F9FC;--gray-100:#F0F2F7;--gray-200:#E2E6EF;
  --gray-400:#9BA3B8;--gray-600:#5A6375;--gray-800:#1E2333;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sora',sans-serif;background:var(--gray-50);color:var(--gray-800);min-height:100vh;}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#EEF0FF 0%,#F8F9FC 60%,#FFF3EE 100%);}
.login-card{background:white;border-radius:24px;padding:48px 40px;width:400px;box-shadow:0 8px 40px rgba(107,92,231,.12);display:flex;flex-direction:column;align-items:center;animation:fadeUp .5s ease both;}
.logo-badge{width:64px;height:64px;background:var(--purple);border-radius:16px;display:flex;align-items:center;justify-content:center;color:white;font-size:28px;font-weight:700;margin-bottom:24px;box-shadow:0 4px 16px rgba(107,92,231,.35);}
.login-card h1{font-size:22px;font-weight:700;margin-bottom:4px;}
.login-card .subtitle{font-size:11px;font-weight:600;letter-spacing:.12em;color:var(--gray-400);text-transform:uppercase;margin-bottom:32px;}
.inp{width:100%;padding:14px 18px;border:1.5px solid var(--gray-200);border-radius:12px;font-family:'Sora',sans-serif;font-size:14px;background:var(--gray-50);outline:none;transition:border-color .2s,box-shadow .2s;margin-bottom:12px;}
.inp:focus{border-color:var(--purple-light);box-shadow:0 0 0 3px rgba(107,92,231,.1);background:white;}
.btn-login{width:100%;margin-top:8px;padding:15px;background:var(--purple);color:white;border:none;border-radius:12px;font-family:'Sora',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;box-shadow:0 4px 16px rgba(107,92,231,.3);transition:background .2s,transform .1s;}
.btn-login:hover{background:#5A4CD6;}
.login-error{color:var(--red);font-size:12px;margin-top:10px;display:none;text-align:center;}
.login-footer{margin-top:24px;text-align:center;}
.login-footer a{color:var(--purple);font-size:12px;font-weight:600;text-decoration:none;cursor:pointer;}

/* APP */
#app{display:none;}
.topbar{background:white;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;padding:0 32px;height:60px;position:sticky;top:0;z-index:100;}
.topbar-logo{display:flex;align-items:center;gap:12px;margin-right:40px;}
.topbar-logo .badge{width:36px;height:36px;background:var(--purple);border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-size:15px;font-weight:700;}
.topbar-logo .app-name{font-size:14px;font-weight:700;}
.topbar-nav{display:flex;gap:4px;}
.nav-btn{padding:8px 18px;border-radius:10px;font-family:'Sora',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--gray-600);transition:background .15s,color .15s;}
.nav-btn.active{background:var(--purple-pale);color:var(--purple);font-weight:600;}
.topbar-actions{display:flex;align-items:center;gap:10px;margin-left:auto;}
.user-avatar{width:36px;height:36px;border-radius:50%;background:var(--purple);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;font-size:14px;}
.btn-nova{padding:9px 20px;background:var(--purple);color:white;border:none;border-radius:12px;font-family:'Sora',sans-serif;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 3px 12px rgba(107,92,231,.3);transition:background .2s,transform .1s;}
.btn-nova:hover{background:#5A4CD6;}

/* VIEWS */
.view{display:none;padding:24px 32px;}
.view.active{display:block;}

/* FILTROS */
.filter-wrap{position:relative;}
.btn-filtro{display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:10px;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-200);background:white;color:var(--gray-600);transition:all .15s;}
.filtro-count{background:var(--purple);color:white;font-size:10px;font-weight:700;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;}
.filtro-panel{position:absolute;top:calc(100% + 8px);left:0;background:white;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.14);border:1px solid var(--gray-200);width:300px;padding:18px;z-index:300;display:none;}
.filtro-panel.open{display:block;}
.fp-section{margin-bottom:14px;}
.fp-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-400);margin-bottom:10px;}
.fp-chips{display:flex;flex-wrap:wrap;gap:6px;}
.fp-chip{padding:6px 13px;border-radius:20px;font-family:'Sora',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-200);background:white;color:var(--gray-600);transition:all .15s;}
.fp-chip.active{background:var(--purple);color:white;border-color:var(--purple);}
.btn-limpar{font-family:'Sora',sans-serif;font-size:12px;font-weight:600;color:var(--red);background:none;border:none;cursor:pointer;padding:4px 8px;}

/* CALENDÁRIO */
.cal-grid{background:white;border-radius:20px;border:1px solid var(--gray-200);overflow:hidden;display:flex;flex-direction:column;}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);background:var(--gray-50);border-bottom:1px solid var(--gray-200);}
.cal-header-day{padding:12px;text-align:center;font-size:11px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.05em;}
.cal-body{display:flex;flex-direction:column;}
.week-row{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--gray-100);}
.day-cell{min-height:120px;padding:8px;border-right:1px solid var(--gray-100);position:relative;display:flex;flex-direction:column;gap:4px;}
.day-cell:last-child{border-right:none;}
.day-cell.empty{background:var(--gray-50);opacity:.4;}
.day-num{font-size:12px;font-weight:700;color:var(--gray-400);margin-bottom:4px;}
.day-cell.today .day-num{color:var(--purple);background:var(--purple-pale);width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.day-actions{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:3px;max-height:100px;padding-right:2px;}
.day-actions::-webkit-scrollbar{width:3px;}
.day-actions::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:10px;}
.dispatch-bar{padding:4px 8px;border-radius:6px;font-size:9px;font-weight:700;color:white;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:transform .1s;}
.dispatch-bar:hover{transform:translateX(2px);filter:brightness(1.1);}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:32px;}
.kpi-card{background:white;padding:24px;border-radius:20px;border:1px solid var(--gray-200);box-shadow:0 2px 12px rgba(0,0,0,.02);}
.kpi-label{font-size:12px;font-weight:600;color:var(--gray-400);margin-bottom:8px;}
.kpi-value{font-size:28px;font-weight:700;margin-bottom:4px;}
.kpi-sub{font-size:11px;color:var(--gray-400);}
.dash-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;}
.dash-col{background:white;padding:24px;border-radius:20px;border:1px solid var(--gray-200);display:flex;flex-direction:column;}
.dash-title{font-size:15px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;}
.canal-stat-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--gray-50);}
.canal-stat-name{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;}
.canal-stat-dot{width:8px;height:8px;border-radius:50%;}
.canal-stat-num{font-size:14px;font-weight:700;text-align:right;}
.canal-stat-sub{font-size:10px;color:var(--gray-400);text-align:right;}
.timeline-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--gray-50);}
.timeline-dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.timeline-name{font-size:12px;font-weight:700;margin-bottom:2px;}
.timeline-date{font-size:10px;color:var(--gray-400);}

/* MODAL */
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(30,35,51,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:1000;}
.modal.open{display:flex;}
.modal-content{background:white;border-radius:24px;width:600px;max-height:90vh;overflow-y:auto;padding:32px;position:relative;animation:fadeUp .3s ease;}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="logo-badge">F</div>
    <h1>Acesso ao Painel</h1>
    <div class="subtitle">Marketing Planner Fotus</div>
    <input type="email" id="login-email" class="inp" placeholder="E-mail">
    <input type="password" id="login-pass" class="inp" placeholder="Senha">
    <button class="btn-login" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-err">Credenciais inválidas</div>
    <div class="login-footer"><a onclick="showForgot()">Esqueci minha senha</a></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-logo">
      <div class="badge">F</div>
      <div>
        <div class="app-name">Marketing Planner</div>
        <div class="user-email" id="top-email">carregando...</div>
      </div>
    </div>
    <div class="topbar-nav">
      <button class="nav-btn active" onclick="showView('calendario')">Calendário</button>
      <button class="nav-btn" onclick="showView('dashboard')">Dashboard</button>
    </div>
    <div class="topbar-actions">
      <div class="filter-wrap">
        <button class="btn-filtro" onclick="toggleFilterPanel()">
          ⚙ Filtros <span class="filtro-count" id="fcnt-cal" style="display:none">0</span>
        </button>
        <div class="filtro-panel" id="fp-cal">
          <div class="fp-section">
            <div class="fp-label">Categoria</div>
            <div class="fp-chips">
              <button class="fp-chip" id="f-cat-COMERCIAL" onclick="toggleF('categorias','COMERCIAL')">Comercial</button>
              <button class="fp-chip" id="f-cat-CONTEUDO" onclick="toggleF('categorias','CONTEUDO')">Conteúdo</button>
              <button class="fp-chip" id="f-cat-EVENTOS" onclick="toggleF('categorias','EVENTOS')">Eventos</button>
            </div>
          </div>
          <div class="fp-section">
            <div class="fp-label">Estratégia</div>
            <div class="fp-chips">
              <button class="fp-chip" id="f-est-INBOUND" onclick="toggleF('estrategias','INBOUND')">Inbound</button>
              <button class="fp-chip" id="f-est-REDE_SOCIAL" onclick="toggleF('estrategias','REDE_SOCIAL')">Rede Social</button>
              <button class="fp-chip" id="f-est-PERFORMANCE" onclick="toggleF('estrategias','PERFORMANCE')">Performance</button>
            </div>
          </div>
          <div class="fp-section">
            <div class="fp-label">Canais</div>
            <div class="fp-chips">
              <button class="fp-chip" id="f-can-inbound_wa" onclick="toggleF('canais','inbound_wa')">WhatsApp</button>
              <button class="fp-chip" id="f-can-inbound_email" onclick="toggleF('canais','inbound_email')">E-mail</button>
              <button class="fp-chip" id="f-can-rede_social_instagram" onclick="toggleF('canais','rede_social_instagram')">Instagram</button>
              <button class="fp-chip" id="f-can-performance_google_ads" onclick="toggleF('canais','performance_google_ads')">Google Ads</button>
            </div>
          </div>
          <div class="fp-footer"><button class="btn-limpar" onclick="clearF()">Limpar filtros</button></div>
        </div>
      </div>
      <button class="btn-nova" onclick="openNewModal()">+ Nova Campanha</button>
      <button class="btn-nova" id="btn-admin-user" onclick="openNewUserModal()" style="background:#444;display:none;">+ Novo Usuário</button>
      <button class="btn-filtro" onclick="exportCSV()">📥 Exportar CSV</button>
      <div class="user-avatar" id="user-avatar" onclick="toggleUserMenu()">M</div>
      <div id="user-menu-dropdown" class="user-dropdown" style="position:absolute;top:60px;right:32px;background:white;border:1px solid var(--gray-200);border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.1);display:none;flex-direction:column;padding:8px;z-index:1001;">
        <button class="user-dropdown-item" onclick="changePassword()" style="padding:10px;border:none;background:none;text-align:left;cursor:pointer;font-family:'Sora',sans-serif;font-size:13px;">Alterar Senha</button>
        <button class="user-dropdown-item" onclick="doLogout()" style="padding:10px;border:none;background:none;text-align:left;cursor:pointer;font-family:'Sora',sans-serif;font-size:13px;color:var(--red);">Sair</button>
      </div>
    </div>
  </div>

  <div id="view-calendario" class="view active">
    <div class="cal-grid">
      <div class="cal-header">
        <div class="cal-header-day">Dom</div><div class="cal-header-day">Seg</div><div class="cal-header-day">Ter</div>
        <div class="cal-header-day">Qua</div><div class="cal-header-day">Qui</div><div class="cal-header-day">Sex</div>
        <div class="cal-header-day">Sáb</div>
      </div>
      <div class="cal-body" id="cal-body"></div>
    </div>
  </div>

  <div id="view-dashboard" class="view">
    <div class="dash-grid" id="dash-kpis"></div>
    <div class="dash-row">
      <div class="dash-col">
        <div class="dash-title">Ações por Canal</div>
        <div id="dash-canal-stats"></div>
      </div>
      <div class="dash-col">
        <div class="dash-title">Campanhas por Categoria</div>
        <div id="dash-cat-bars"></div>
      </div>
      <div class="dash-col">
        <div class="dash-title">Próximas Atividades</div>
        <div id="dash-disparos"></div>
      </div>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://qoctnofguhjlfraoiqwx.supabase.co';
const SB_KEY = 'sb_publishable_BW72en5_69z4r3yVLJuk1Q_rXVywKs8';

let campaigns = [];
let currentUser = null;
let fpState = {categorias:[], estrategias:[], canais:[]};

async function sb(path, method='GET', body=null){
  const opt = { method, headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' } };
  if(body) opt.body = JSON.stringify(body);
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, opt);
  return res.ok ? res.json() : [];
}

function doLogin(){
  const e = document.getElementById('login-email').value;
  const p = document.getElementById('login-pass').value;
  const users = JSON.parse(localStorage.getItem('fotus_users') || '[{"email":"mariana.cassiano@fotus.com.br","senha":"123456","nome":"MARIANA CASSIANO","role":"admin"},{"email":"usuario@fotus.com.br","senha":"user123","nome":"USUARIO PADRAO","role":"user"}]');
  const user = users.find(u => u.email === e && u.senha === p);
  if(user){
    currentUser = user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('top-email').textContent = e;
    if(user.role === 'admin') document.getElementById('btn-admin-user').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}

function toggleUserMenu(){
  const menu = document.getElementById('user-menu-dropdown');
  menu.style.display = menu.style.display === 'none' ? 'flex' : 'none';
}

function doLogout(){ location.reload(); }

async function loadData(){
  campaigns = await sb('campaigns?select=*&order=inicio.asc');
  renderAll();
}

function renderAll(){
  renderCalendar();
  renderDashboard();
}

function getFiltered(){
  return campaigns.filter(c => {
    if(fpState.categorias.length && !fpState.categorias.includes(c.categoria)) return false;
    if(fpState.estrategias.length){
        const hasEst = fpState.estrategias.some(est => {
            if(est==='INBOUND') return (c.inbound_wa||[]).length || (c.inbound_email||[]).length;
            if(est==='REDE_SOCIAL') return (c.rede_social_instagram||[]).length;
            if(est==='PERFORMANCE') return (c.performance_google_ads||[]).length;
            return false;
        });
        if(!hasEst) return false;
    }
    if(fpState.canais.length){
        const hasCanal = fpState.canais.some(can => (c[can]||[]).length > 0);
        if(!hasCanal) return false;
    }
    return true;
  });
}

function renderCalendar(){
  const body = document.getElementById('cal-body');
  body.innerHTML = '';
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const first = new Date(year, month, 1).getDay();
  const days = new Date(year, month + 1, 0).getDate();
  
  let date = 1;
  const filtered = getFiltered();

  for(let i=0; i<6; i++){
    const row = document.createElement('div');
    row.className = 'week-row';
    for(let j=0; j<7; j++){
      const cell = document.createElement('div');
      cell.className = 'day-cell';
      if(i===0 && j<first || date > days){
        cell.classList.add('empty');
      } else {
        const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(date).padStart(2,'0')}`;
        cell.innerHTML = `<div class="day-num">${date}</div>`;
        const actionsCont = document.createElement('div');
        actionsCont.className = 'day-actions';
        
        filtered.forEach(cp => {
          const map = [
            {d:cp.inbound_wa, e:'INB', n:'WPP', c:'#25D366'}, {d:cp.inbound_email, e:'INB', n:'EMM', c:'#2196F3'},
            {d:cp.rede_social_instagram, e:'SOC', n:'INST', c:'#E91E63'}, {d:cp.performance_google_ads, e:'PERF', n:'GADS', c:'#EA4335'}
          ];
          map.forEach(m => {
            if((m.d||[]).includes(dStr)){
              const bar = document.createElement('div');
              bar.className = 'dispatch-bar';
              bar.style.background = m.c;
              bar.textContent = `${cp.name} [${m.e}-${m.n}]`;
              actionsCont.appendChild(bar);
            }
          });
        });
        cell.appendChild(actionsCont);
        date++;
      }
      row.appendChild(cell);
    }
    body.appendChild(row);
    if(date > days) break;
  }
}

function renderDashboard(){
  const filtered = getFiltered();
  const ts = new Date().toISOString().split('T')[0];
  
  const td = filtered.reduce((a,c) => a + (c.inbound_wa||[]).length + (c.inbound_email||[]).length + (c.rede_social_instagram||[]).length + (c.performance_google_ads||[]).length, 0);
  
  document.getElementById('dash-kpis').innerHTML = `
    <div class="kpi-card"><div class="kpi-label">Total Campanhas</div><div class="kpi-value">${filtered.length}</div></div>
    <div class="kpi-card"><div class="kpi-label">Total Ações</div><div class="kpi-value" style="color:var(--orange)">${td}</div></div>
  `;

  const stats = {
    'WhatsApp': filtered.reduce((a,c)=>a+(c.inbound_wa||[]).length,0),
    'Instagram': filtered.reduce((a,c)=>a+(c.rede_social_instagram||[]).length,0),
    'Google Ads': filtered.reduce((a,c)=>a+(c.performance_google_ads||[]).length,0)
  };
  
  document.getElementById('dash-canal-stats').innerHTML = Object.entries(stats).map(([n,v]) => `
    <div class="canal-stat-row"><span>${n}</span><span>${v}</span></div>
  `).join('');
}

function toggleFilterPanel(){ document.getElementById('fp-cal').classList.toggle('open'); }

function toggleF(type, val){
  const idx = fpState[type].indexOf(val);
  if(idx>=0) fpState[type].splice(idx,1); else fpState[type].push(val);
  document.getElementById(`f-${type.slice(0,3)}-${val}`).classList.toggle('active');
  const total = fpState.categorias.length + fpState.estrategias.length + fpState.canais.length;
  const b = document.getElementById('fcnt-cal');
  b.textContent = total; b.style.display = total > 0 ? 'inline-flex' : 'none';
  renderAll();
}

function clearF(){
  fpState = {categorias:[], estrategias:[], canais:[]};
  document.querySelectorAll('.fp-chip').forEach(c => c.classList.remove('active'));
  document.getElementById('fcnt-cal').style.display = 'none';
  renderAll();
}

function exportCSV(){
  let csv = 'Campanha,Categoria,Estrategia,Canal,Data\\n';
  campaigns.forEach(c => {
    const map = [{d:c.inbound_wa, e:'INB', n:'WPP'}, {d:c.inbound_email, e:'INB', n:'EMM'}, {d:c.rede_social_instagram, e:'SOC', n:'INST'}, {d:c.performance_google_ads, e:'PERF', n:'GADS'}];
    map.forEach(m => {
      (m.d||[]).forEach(dt => { csv += `${c.name},${c.categoria},${m.e},${m.n},${dt}\\n`; });
    });
  });
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'planner_fotus.csv';
  link.click();
}

function openNewUserModal(){
  document.getElementById('new-user-email').value = '';
  document.getElementById('new-user-senha').value = '';
  document.getElementById('new-user-role').value = 'user';
  document.getElementById('modal-new-user').classList.add('open');
}

function closeNewUserModal(){
  document.getElementById('modal-new-user').classList.remove('open');
}

function saveNewUser(){
  const email = document.getElementById('new-user-email').value.trim();
  const senha = document.getElementById('new-user-senha').value.trim();
  const role = document.getElementById('new-user-role').value;
  
  if(!email || !senha){
    alert('E-mail e senha são obrigatórios!');
    return;
  }
  
  const users = JSON.parse(localStorage.getItem('fotus_users') || '[]');
  if(users.find(u => u.email === email)){
    alert('Este e-mail já existe!');
    return;
  }
  
  const nome = email.split('@')[0].toUpperCase().replace(/\\./g, ' ');
  users.push({email, senha, nome, role});
  localStorage.setItem('fotus_users', JSON.stringify(users));
  closeNewUserModal();
  alert('Usuário criado com sucesso!');
}

function changePassword(){
  const senhaAtual = prompt('Digite sua senha atual:');
  if(!senhaAtual || senhaAtual !== currentUser.senha){
    alert('Senha atual incorreta!');
    return;
  }
  const novaSenha = prompt('Digite a nova senha:');
  if(!novaSenha){
    alert('Operação cancelada.');
    return;
  }
  const users = JSON.parse(localStorage.getItem('fotus_users') || '[]');
  const userIdx = users.findIndex(u => u.email === currentUser.email);
  if(userIdx >= 0){
    users[userIdx].senha = novaSenha;
    currentUser.senha = novaSenha;
    localStorage.setItem('fotus_users', JSON.stringify(users));
    alert('Senha alterada com sucesso!');
  }
}

function showView(v){
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById(`view-${v}`).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}
</script>

<div id="modal-new-user" class="modal">
  <div class="modal-content">
    <h2>Criar Novo Usuário</h2>
    <input type="email" id="new-user-email" class="inp" placeholder="E-mail do novo usuário" style="margin-top:16px;">
    <input type="password" id="new-user-senha" class="inp" placeholder="Senha inicial">
    <select id="new-user-role" class="inp" style="font-family:'Sora',sans-serif;">
      <option value="user">Usuário</option>
      <option value="admin">Administrador</option>
    </select>
    <div style="display:flex;gap:10px;margin-top:20px;">
      <button class="btn-nova" onclick="saveNewUser()" style="flex:1;">Criar Usuário</button>
      <button class="btn-nova" onclick="closeNewUserModal()" style="flex:1;background:#999;">Cancelar</button>
    </div>
  </div>
</div>

</script>
</body>
</html>
