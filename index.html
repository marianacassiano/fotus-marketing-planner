<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>FOTUS - Inteligência AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --purple: #0D518E; --orange: #FAB515; --gray-50: #F8F9FC; --gray-200: #E2E6EF; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Sora', sans-serif; }
        body { background: var(--gray-50); padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: white; padding: 20px; border-radius: 15px; border: 1px solid var(--gray-200); }
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { background: white; padding: 24px; border-radius: 16px; border: 1px solid var(--gray-200); box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .btn-analisar { background: var(--purple); color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .btn-config { background: #eee; border: none; padding: 12px; border-radius: 10px; cursor: pointer; margin-right: 10px; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; }
        .modal.active { display:flex; }
        .modal-content { background:white; padding:30px; border-radius:20px; width:400px; }
        .input-key { width:100%; padding:12px; margin:15px 0; border:1px solid #ddd; border-radius:8px; }
        .tema-bar { height: 8px; background: var(--purple); border-radius: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: 800; font-size: 20px; color: var(--purple);">FOTUS PLANNER</div>
        <div>
            <button class="btn-config" onclick="toggleModal(true)">⚙️ Configurar Chave</button>
            <button class="btn-analisar" id="btn-run" onclick="runIntelAnalysis()">⚡ Analisar Agora</button>
        </div>
    </div>

    <div id="dashboard" class="card-grid">
        </div>

    <div id="modal-key" class="modal">
        <div class="modal-content">
            <h3>Configurar Groq API</h3>
            <input type="password" id="input-key" class="input-key" placeholder="gsk_...">
            <button onclick="saveKey()" style="width:100%; padding:12px; background:var(--purple); color:white; border:none; border-radius:8px; cursor:pointer;">Salvar no Supabase</button>
            <button onclick="toggleModal(false)" style="width:100%; margin-top:10px; background:none; border:none; color:#666; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <script>
        // Use o ID de usuário que está nas suas imagens (pode ser fixo ou dinâmico)
        const USER_ID = "63d76b1e-28f7-4a00-9844-075276e02621"; 

        // 1. SALVAR CHAVE NO BANCO
        async function saveKey() {
            const key = document.getElementById('input-key').value.trim();
            if (!key.startsWith('gsk_')) return alert("A chave deve começar com gsk_");

            const payload = { userid: USER_ID, groqapikey: key, updatedat: new Date() };
            
            try {
                // Tentamos buscar se já existe para atualizar (UPSERT)
                await sbFetch('groq_config', 'POST', payload); 
                alert("Chave salva com sucesso!");
                toggleModal(false);
            } catch (e) {
                alert("Erro ao salvar no banco. Verifique sua conexão.");
            }
        }

        // 2. FUNÇÃO PRINCIPAL DE ANÁLISE
        async function runIntelAnalysis() {
            const btn = document.getElementById('btn-run');
            btn.innerHTML = "⏳ Buscando chave...";
            btn.disabled = true;

            try {
                // BUSCA A CHAVE DIRETO NO BANCO ANTES DE TUDO
                const configData = await sbFetch(`groq_config?userid=eq.${USER_ID}&limit=1`);
                
                if (!configData || configData.length === 0 || !configData[0].groqapikey) {
                    btn.innerHTML = "⚡ Analisar Agora";
                    btn.disabled = false;
                    alert("Chave não encontrada no banco! Use o botão de engrenagem.");
                    return toggleModal(true);
                }

                const REAL_KEY = configData[0].groqapikey;
                btn.innerHTML = "🚀 IA Processando...";

                // CHAMADA PARA O GROQ
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${REAL_KEY}`, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{role: "user", content: "Gere um JSON com: temas (lista com nome e score), ideias (lista com titulo) e analise (string) sobre energia solar."}],
                        response_format: { type: "json_object" }
                    })
                });

                if (!response.ok) throw new Error("A chave do Groq é inválida ou expirou.");

                const resJson = await response.json();
                const aiData = JSON.parse(resJson.choices[0].message.content);

                // SALVA A ANÁLISE NO BANCO
                await sbFetch('analyses', 'POST', {
                    userid: USER_ID,
                    radardata: JSON.stringify(aiData.temas),
                    ideasdata: JSON.stringify(aiData.ideias),
                    alertasdata: JSON.stringify({texto: aiData.analise}),
                    updatedat: new Date()
                });

                renderUI(aiData);
                alert("Análise atualizada!");

            } catch (e) {
                alert("Erro: " + e.message);
            } finally {
                btn.innerHTML = "⚡ Analisar Agora";
                btn.disabled = false;
            }
        }

        // 3. RENDERIZAR NA TELA
        function renderUI(data) {
            const dash = document.getElementById('dashboard');
            dash.innerHTML = `
                <div class="card"><h3>Temas</h3>${data.temas.map(t => `<p>${t.nome}</p><div class="tema-bar" style="width:${t.score}%"></div>`).join('')}</div>
                <div class="card"><h3>Ideias</h3>${data.ideias.map(i => `<p>• ${i.titulo}</p>`).join('')}</div>
                <div class="card"><h3>Análise</h3><p style="font-size:13px;">${data.analise}</p></div>
            `;
        }

        function toggleModal(show) { document.getElementById('modal-key').classList.toggle('active', show); }

        // 4. MOTOR DE COMUNICAÇÃO SUPABASE (COLE SEUS DADOS AQUI)
        async function sbFetch(endpoint, method = 'GET', body = null) {
            const SUPABASE_URL = "SUA_URL_AQUI"; // Ex: https://xyz.supabase.co
            const SUPABASE_KEY = "SUA_ANON_KEY_AQUI";

            const options = {
                method,
                headers: {
                    "apikey": SUPABASE_KEY,
                    "Authorization": `Bearer ${SUPABASE_KEY}`,
                    "Content-Type": "application/json",
                    "Prefer": "return=representation"
                }
            };
            if (body) options.body = JSON.stringify(body);

            const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, options);
            if (!res.ok) throw new Error("Erro na requisição ao Supabase");
            return res.json();
        }

        // Carregar última análise ao abrir
        window.onload = async () => {
            const last = await sbFetch(`analyses?userid=eq.${USER_ID}&order=updatedat.desc&limit=1`);
            if(last.length > 0) renderUI({
                temas: JSON.parse(last[0].radardata),
                ideias: JSON.parse(last[0].ideasdata),
                analise: JSON.parse(last[0].alertasdata).texto
            });
        };
    </script>
</body>
</html>
