<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>FOTUS - Inteligência AI</title>
    <style>
        /* Estilos simplificados para o exemplo */
        :root { --purple: #0D518E; --gray-50: #F8F9FC; --gray-400: #9BA3B8; }
        body { font-family: 'Sora', sans-serif; background: var(--gray-50); }
        .intel-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .intel-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .btn-analisar { background: var(--purple); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; }
        .modal-overlay.open { display:flex; }
        .modal { background:white; padding:30px; border-radius:12px; width:400px; }
    </style>
</head>
<body>

    <div style="padding: 30px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2>Módulo de Inteligência Solar</h2>
            <div style="display:flex; gap:10px;">
                <button onclick="openIntelConfigModal()" style="background:none; border:1px solid #ccc; border-radius:8px; cursor:pointer; padding:5px 10px;">⚙️</button>
                <button class="btn-analisar" id="btn-run-intel" onclick="runIntelAnalysis()">⚡ Analisar Agora</button>
            </div>
        </div>
        
        <div id="intel-last-run" style="font-size:12px; color:var(--gray-400); margin-bottom:10px;"></div>
        <div id="view-intel-content"></div>
    </div>

    <div id="modal-intel-config" class="modal-overlay">
        <div class="modal">
            <h3>Configurar Groq API</h3>
            <p style="font-size:12px; color:#666;">A chave será salva no seu perfil do Supabase.</p>
            <input type="password" id="input-groq-key" style="width:100%; padding:10px; margin:15px 0;" placeholder="gsk_...">
            <div style="display:flex; justify-content:flex-end; gap:10px;">
                <button onclick="closeIntelConfigModal()">Cancelar</button>
                <button onclick="saveIntelKey()" style="background:var(--purple); color:white; border:none; padding:8px 15px; border-radius:5px;">Salvar no Banco</button>
            </div>
        </div>
    </div>

    <script>
        /* --- 1. VARIÁVEIS GLOBAIS DE ESTADO --- 
           (Substituição 1: Sem localStorage)
        */
        let intelConcorrentes = [];
        let intelAnalysisRunning = false;
        let intelLastAnalysis = null;
        let intelCurrentTab = 'radar';
        let intelData = { radar: null, ideias: null, alertas: null };
        let GROQ_API_KEY = ""; // Carregada do banco groq_config

        /* --- 2. CARREGAMENTO INICIAL (Substituição 2) --- 
        */
        async function renderIntelView() {
            Promise.all([
                loadGroqKeyFromSupabase(), // Busca chave na tabela groq_config
                loadAnalysesFromSupabase(), // Busca última análise na tabela analyses
                loadCompetitorsFromSupabase() // Busca lista de concorrentes
            ]).then(() => {
                renderIntelTab(intelCurrentTab);
            }).catch(e => console.error('Erro ao carregar inteligência:', e));
        }

        /* --- 3. BUSCAR CHAVE NO SUPABASE (Tabela groq_config) --- 
        */
        async function loadGroqKeyFromSupabase() {
            try {
                const rows = await sbFetch('groq_config?userid=eq.' + currentUser.id + '&limit=1');
                if (rows && rows.length > 0) {
                    GROQ_API_KEY = rows[0].groqapikey;
                    return true;
                }
                return false;
            } catch (e) {
                console.error("Erro ao carregar chave do banco:", e);
                return false;
            }
        }

        /* --- 4. CARREGAR ANÁLISES (Substituição 5 unificada) --- 
        */
        async function loadAnalysesFromSupabase() {
            try {
                const rows = await sbFetch('analyses?userid=eq.' + currentUser.id + '&order=updatedat.desc&limit=1');
                if (!rows || rows.length === 0) return;
                
                const latest = rows[0];
                intelLastAnalysis = latest.updatedat;
                intelData.radar   = latest.radardata   ? JSON.parse(latest.radardata)   : null;
                intelData.ideias  = latest.ideasdata   ? JSON.parse(latest.ideasdata)   : null;
                intelData.alertas = latest.alertasdata ? JSON.parse(latest.alertasdata) : null;
                
                const lastEl = document.getElementById('intel-last-run');
                if (lastEl && intelLastAnalysis) lastEl.textContent = 'Última análise: ' + new Date(intelLastAnalysis).toLocaleString('pt-BR');
            } catch (e) {
                console.error('Erro ao carregar análises:', e);
            }
        }

        /* --- 5. RENDERIZAÇÃO DO RADAR (Substituição 3) --- 
        */
        function renderTabRadar(cont) {
            const stored = intelData.radar;
            const storedIdeias = intelData.ideias;
            if (!stored) {
                cont.innerHTML = `<div style="padding:40px; text-align:center; color:#999;">📡 Clique em Analisar para começar.</div>`;
                return;
            }
            const ts = intelLastAnalysis ? new Date(intelLastAnalysis).toLocaleString('pt-BR') : '—';
            
            cont.innerHTML = `
                <div class="intel-grid-3">
                    <div class="intel-card"><strong>Top Temas</strong><div id="intel-radar-temas"></div></div>
                    <div class="intel-card"><strong>Formatos</strong><div id="intel-radar-formatos"></div></div>
                    <div class="intel-card"><strong>Ideias</strong><div id="intel-ideias-lista"></div></div>
                </div>
                <div class="intel-card"><strong>Análise Completa</strong><div id="intel-radar-analise"></div></div>
                <div style="text-align:right; font-size:10px; color:#999;">Atualizado em: ${ts}</div>
            `;

            // Preenche Temas
            const temasEl = document.getElementById('intel-radar-temas');
            (stored.temas || []).forEach((t, i) => {
                temasEl.innerHTML += `<div style="font-size:12px; margin-top:5px;">${i+1}. ${t.tema || t.nome} (${t.score}%)</div>`;
            });

            // Preenche Ideias
            const ideiasEl = document.getElementById('intel-ideias-lista');
            (storedIdeias?.ideias || []).forEach(ideia => {
                ideiasEl.innerHTML += `<div style="border-left:3px solid var(--purple); padding-left:8px; margin-bottom:10px;">
                    <div style="font-size:12px; font-weight:bold;">${ideia.titulo}</div>
                    <div style="font-size:10px; color:#666;">${ideia.tipo}</div>
                </div>`;
            });

            document.getElementById('intel-radar-analise').innerHTML = stored.analise || '';
        }

        /* --- 6. EXECUÇÃO DA ANÁLISE COM GROQ (Substituição 6) --- 
        */
        async function runIntelAnalysis() {
            if (intelAnalysisRunning) return;

            // Garante que a chave existe (busca no banco se a variável estiver vazia)
            if (!GROQ_API_KEY) {
                const loaded = await loadGroqKeyFromSupabase();
                if (!loaded) {
                    alert("Por favor, configure sua chave Groq primeiro.");
                    openIntelConfigModal();
                    return;
                }
            }

            intelAnalysisRunning = true;
            const btn = document.getElementById('btn-run-intel');
            btn.innerHTML = "⏳ Analisando...";

            try {
                const prompt = `Analise o mercado solar para a empresa Fotus. Concorrentes: ${intelConcorrentes.join(', ')}. Responda APENAS JSON.`;
                
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${GROQ_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{role: "user", content: prompt}],
                        response_format: { type: "json_object" }
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.choices[0].message.content);

                const now = new Date().toISOString();

                // Atualiza estado em memória (Substituição 6)
                intelData.radar   = result.radar;
                intelData.ideias  = result.ideias;
                intelData.alertas = result.alertas;
                intelLastAnalysis = now;

                // Salva no Supabase (Tabela analyses)
                await saveAnalysisToSupabase(result.radar, result.ideias, result.alertas, intelConcorrentes, now);

                renderTabRadar(document.getElementById('view-intel-content'));
                alert("✅ Análise concluída!");

            } catch (e) {
                console.error(e);
                alert("Erro na análise. Verifique sua chave API.");
            } finally {
                intelAnalysisRunning = false;
                btn.innerHTML = "⚡ Analisar Agora";
            }
        }

        /* --- 7. FUNÇÕES AUXILIARES DE MODAL E SALVAMENTO --- 
        */
        function openIntelConfigModal() { document.getElementById('modal-intel-config').classList.add('open'); }
        function closeIntelConfigModal() { document.getElementById('modal-intel-config').classList.remove('open'); }

        async function saveIntelKey() {
            const val = document.getElementById('input-groq-key').value.trim();
            if (!val) return;
            
            try {
                // Salva na tabela groq_config do Supabase
                await sbFetch('groq_config', 'POST', { userid: currentUser.id, groqapikey: val });
                GROQ_API_KEY = val;
                alert("Chave salva!");
                closeIntelConfigModal();
            } catch (e) { alert("Erro ao salvar."); }
        }

        async function saveAnalysisToSupabase(radar, ideias, alertas, concorrentes, now) {
            const payload = {
                userid: currentUser.id,
                radardata: JSON.stringify(radar),
                ideasdata: JSON.stringify(ideias),
                alertasdata: JSON.stringify(alertas),
                updatedat: now
            };
            return await sbFetch('analyses', 'POST', payload);
        }

        function renderIntelTab(tab) {
            renderTabRadar(document.getElementById('view-intel-content'));
        }

        // Inicializa
        window.onload = renderIntelView;
    </script>
</body>
</html>
